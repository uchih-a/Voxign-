<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="512"
  height="512"
>
  <!-- Background (for maskable icon, can be transparent) -->
  <rect width="512" height="512" fill="#4ADE80" />

  <!-- Hand illustration (simpler for mask) -->
  <g transform="translate(256, 256) scale(2)">
    <!-- Wrist circle -->
    <circle cx="0" cy="30" r="15" fill="white" />

    <!-- Palm circles -->
    <circle cx="-20" cy="10" r="8" fill="white" />
    <circle cx="0" cy="0" r="8" fill="white" />
    <circle cx="20" cy="10" r="8" fill="white" />

    <!-- Finger tips -->
    <circle cx="-30" cy="-20" r="6" fill="white" />
    <circle cx="-15" cy="-30" r="6" fill="white" />
    <circle cx="0" cy="-35" r="6" fill="white" />
    <circle cx="15" cy="-30" r="6" fill="white" />
    <circle cx="30" cy="-20" r="6" fill="white" />

    <!-- Connection lines -->
    <line x1="0" y1="30" x2="-20" y2="10" stroke="white" stroke-width="2" />
    <line x1="0" y1="30" x2="0" y2="0" stroke="white" stroke-width="2" />
    <line x1="0" y1="30" x2="20" y2="10" stroke="white" stroke-width="2" />
    <line x1="-20" y1="10" x2="-30" y2="-20" stroke="white" stroke-width="1" />
    <line x1="-20" y1="10" x2="-15" y2="-30" stroke="white" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="-35" stroke="white" stroke-width="1" />
    <line x1="20" y1="10" x2="15" y2="-30" stroke="white" stroke-width="1" />
    <line x1="20" y1="10" x2="30" y2="-20" stroke="white" stroke-width="1" />
  </g>
</svg>
