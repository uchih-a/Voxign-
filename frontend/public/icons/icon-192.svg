<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 192 192"
  width="192"
  height="192"
>
  <!-- Background -->
  <rect width="192" height="192" fill="#0C1A12" />

  <!-- Hand illustration group -->
  <g transform="translate(96, 96)">
    <!-- Wrist circle -->
    <circle cx="0" cy="30" r="15" fill="#4ADE80" opacity="0.8" />

    <!-- Palm circles -->
    <circle cx="-20" cy="10" r="8" fill="#4ADE80" opacity="0.7" />
    <circle cx="0" cy="0" r="8" fill="#4ADE80" opacity="0.7" />
    <circle cx="20" cy="10" r="8" fill="#4ADE80" opacity="0.7" />

    <!-- Finger tips -->
    <circle cx="-30" cy="-20" r="6" fill="#4ADE80" />
    <circle cx="-15" cy="-30" r="6" fill="#4ADE80" />
    <circle cx="0" cy="-35" r="6" fill="#4ADE80" />
    <circle cx="15" cy="-30" r="6" fill="#4ADE80" />
    <circle cx="30" cy="-20" r="6" fill="#4ADE80" />

    <!-- Connection lines -->
    <line x1="0" y1="30" x2="-20" y2="10" stroke="#4ADE80" stroke-width="2" opacity="0.5" />
    <line x1="0" y1="30" x2="0" y2="0" stroke="#4ADE80" stroke-width="2" opacity="0.5" />
    <line x1="0" y1="30" x2="20" y2="10" stroke="#4ADE80" stroke-width="2" opacity="0.5" />
    <line x1="-20" y1="10" x2="-30" y2="-20" stroke="#4ADE80" stroke-width="1" opacity="0.4" />
    <line x1="-20" y1="10" x2="-15" y2="-30" stroke="#4ADE80" stroke-width="1" opacity="0.4" />
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#4ADE80" stroke-width="1" opacity="0.4" />
    <line x1="20" y1="10" x2="15" y2="-30" stroke="#4ADE80" stroke-width="1" opacity="0.4" />
    <line x1="20" y1="10" x2="30" y2="-20" stroke="#4ADE80" stroke-width="1" opacity="0.4" />
  </g>

  <!-- Border glow -->
  <circle cx="96" cy="96" r="90" fill="none" stroke="#4ADE80" stroke-width="2" opacity="0.3" />
</svg>
